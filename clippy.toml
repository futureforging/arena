type-complexity-threshold = 100 # Warn when types become hard to read.
cognitive-complexity-threshold = 12 # Prefer smaller, simpler functions.
excessive-nesting-threshold = 4 # Discourage deeply nested control flow.
too-many-arguments-threshold = 5 # Encourage grouping of params.
max-fn-params-bools = 1 # Avoid bool param soup.
too-many-lines-threshold = 80 # Keep functions short and focused.
max-struct-bools = 1 # Avoid flag-heavy structs.
max-trait-bounds = 3 # Reduce complex trait bounds.
enum-variant-name-threshold = 2 # Allow only small shared prefixes.
single-char-binding-names-threshold = 2 # Limit short/unclear bindings.
pass-by-value-size-limit = 64 # Prefer refs for larger types.
large-error-threshold = 64 # Prefer boxed or smaller error types.
array-size-threshold = 128 # Warn on large stack arrays.
stack-size-threshold = 512 # Limit large stack frames.
too-large-for-stack = 256 # Suggest boxing very large types.
vec-box-size-threshold = 4096 # Warn if Vec/Box is excessively large.
allow-dbg-in-tests = false # Keep tests clean of dbg! calls.
allow-print-in-tests = false # Avoid println!/eprintln! in tests.
allow-expect-in-tests = false # Prefer Result-based tests.
allow-unwrap-in-tests = false # Prefer explicit test errors.
allow-panic-in-tests = false # Avoid panic! in tests.
