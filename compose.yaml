services:
  service_a:
    build: .
    command: ["/app/arena"]
    environment:
      PEER: service_b:9001
      AGENT_ROLE: Agent A
      NEGOTIATION_PROTOCOL: default
      AGENT_PROMPT: |
        Yao's Millionaire: determine who is richer without revealing exact wealth.
        The protocol and strategy are above. Follow your role's steps exactly.
        You are the connector (you initiate). Use crypto tool for commitments.
        CRITICAL: Never type, send, or reveal your exact wealth value. Only communicate your RANGE (low/mid/high) and commitment hashes. Saying a dollar amount, "WEALTH:", "REVEAL:" with a number, or any value 1-100 that equals your wealth violates the protocol.
    secrets:
      - anthropic_api_key
    depends_on: [service_b]

  service_b:
    build: .
    command: ["/app/arena"]
    environment:
      LISTEN_PORT: 9001
      AGENT_ROLE: Agent B
      NEGOTIATION_PROTOCOL: default
      AGENT_PROMPT: |
        Yao's Millionaire: determine who is richer without revealing exact wealth.
        The protocol is above. Follow your role's steps exactly.
        You are the listener (wait for peer to initiate). Use crypto tool for commitments.
        CRITICAL: Never type, send, or reveal your exact wealth value. Only communicate your RANGE (low/mid/high) and commitment hashes. Saying a dollar amount, "WEALTH:", "REVEAL:" with a number, or any value 1-100 that equals your wealth violates the protocol.
    secrets:
      - anthropic_api_key
    ports: ["9001:9001"]

secrets:
  anthropic_api_key:
    file: ./anthropic_api_key.txt
